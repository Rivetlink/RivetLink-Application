name: Release

# Builds native installers for Linux, macOS, and Windows, signs the updater
# artifacts, and publishes them + a `latest.json`. tauri-action uploads to a
# draft release; the rename-assets job renames the assets and publishes it so
# the `releases/latest/download/latest.json` updater endpoint resolves.
# Triggered by pushing a version tag (v1.2.3) or manually.
#
# Bundles: deb/rpm (Linux), dmg/app (macOS, universal), nsis/msi (Windows).
# Auto-update works on macOS + Windows (the app's updater fetches latest.json
# and installs in place). Linux installs via the .deb/.rpm; the app only
# notifies about new versions there.
#
# Requires repo secrets:
#   SDK_REPO_TOKEN            — read access to the private Rivetlink/RivetLink.
#   TAURI_SIGNING_PRIVATE_KEY — the minisign private key for updater signatures.
# The matching public key lives in tauri.conf.json (plugins.updater.pubkey).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ships .deb/.rpm only (built on 24.04, runs broadly incl. 26.04).
          # AppImage is dropped: a 24.04-built one aborts (EGL/glib) on Ubuntu
          # 26.04, and a 26.04-built one won't compile (libspa vs newer PipeWire
          # headers). Flatpak is the planned cross-distro self-update path.
          - os: ubuntu-24.04
            args: "--bundles deb,rpm"
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev clang libpam0g-dev
          # libpipewire + clang: the app now embeds the host capture stack
          # (scap -> PipeWire/ScreenCast portal; pipewire-sys uses bindgen).

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      # The AppStream <releases> entry should always match the tag being built.
      # Stamp it here so it never needs manual editing per version.
      - name: Stamp metainfo release
        if: startsWith(matrix.os, 'ubuntu')
        working-directory: RivetLink-Application/src-tauri/metainfo
        env:
          TAG: ${{ github.ref_name }}
        run: |
          V="${TAG#v}"
          DATE="$(date +%F)"
          python3 - "$V" "$DATE" <<'PY'
          import re, sys
          v, d = sys.argv[1], sys.argv[2]
          f = "com.rivetlink.app.metainfo.xml"
          s = open(f).read()
          block = f'  <releases>\n    <release version="{v}" date="{d}" />\n  </releases>'
          s = re.sub(r"  <releases>.*?</releases>", block, s, flags=re.S)
          open(f, "w").write(s)
          print(block)
          PY

      - name: Build, sign, and publish to a draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: RivetLink-Application
          tagName: ${{ github.ref_name }}
          releaseName: "RivetLink ${{ github.ref_name }}"
          releaseBody: "Native installers for Linux, macOS, and Windows. macOS/Windows update in place; on Linux install the .deb/.rpm."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # tauri-action names artifacts without the OS word (e.g. RivetLink_0.1.4_amd64.deb).
  # Rename every asset to RivetLink_<version>_<os>_<arch>.<ext> and patch the
  # matching URLs inside latest.json so the updater still resolves them.
  rename-assets:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Rename release assets + patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${TAG#v}"
          gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | "\(.apiUrl)\t\(.name)"' > assets.tsv
          while IFS=$'\t' read -r url name; do
            case "$name" in
              *_amd64.deb)                new="RivetLink_${V}_linux_amd64.deb" ;;
              *_amd64.deb.sig)            new="RivetLink_${V}_linux_amd64.deb.sig" ;;
              *.x86_64.rpm)               new="RivetLink_${V}_linux_x86_64.rpm" ;;
              *.x86_64.rpm.sig)           new="RivetLink_${V}_linux_x86_64.rpm.sig" ;;
              *_amd64.AppImage)           new="RivetLink_${V}_linux_amd64.AppImage" ;;
              *_amd64.AppImage.sig)       new="RivetLink_${V}_linux_amd64.AppImage.sig" ;;
              *_universal.dmg)            new="RivetLink_${V}_macos_universal.dmg" ;;
              *_universal.app.tar.gz)     new="RivetLink_${V}_macos_universal.app.tar.gz" ;;
              *_universal.app.tar.gz.sig) new="RivetLink_${V}_macos_universal.app.tar.gz.sig" ;;
              *x64-setup.exe)             new="RivetLink_${V}_windows_x64-setup.exe" ;;
              *x64-setup.exe.sig)         new="RivetLink_${V}_windows_x64-setup.exe.sig" ;;
              *x64_en-US.msi)             new="RivetLink_${V}_windows_x64_en-US.msi" ;;
              *x64_en-US.msi.sig)         new="RivetLink_${V}_windows_x64_en-US.msi.sig" ;;
              *) continue ;;
            esac
            [ "$name" = "$new" ] && continue
            gh api -X PATCH "${url#https://api.github.com}" -f name="$new" -q '.name' \
              | sed "s/^/renamed: $name -> /"
          done < assets.tsv

          LJ_URL=$(gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | select(.name=="latest.json") | .apiUrl')
          gh api "${LJ_URL#https://api.github.com}" \
            -H "Accept: application/octet-stream" > latest.json
          sed -i \
            -e "s#RivetLink_${V}_amd64.deb#RivetLink_${V}_linux_amd64.deb#g" \
            -e "s#RivetLink-${V}-1.x86_64.rpm#RivetLink_${V}_linux_x86_64.rpm#g" \
            -e "s#RivetLink_${V}_amd64.AppImage#RivetLink_${V}_linux_amd64.AppImage#g" \
            -e "s#RivetLink_${V}_x64_en-US.msi#RivetLink_${V}_windows_x64_en-US.msi#g" \
            -e "s#RivetLink_${V}_x64-setup.exe#RivetLink_${V}_windows_x64-setup.exe#g" \
            -e "s#RivetLink_universal.app.tar.gz#RivetLink_${V}_macos_universal.app.tar.gz#g" \
            latest.json
          # The .deb and .AppImage are built in separate jobs (different Ubuntu
          # bases), so the merged manifest's primary "linux-x86_64" key can race
          # to the .deb. Force it to the AppImage — the only self-updatable Linux
          # format — so updates install in place instead of opening a download.
          python3 - <<'PY'
          import json
          m = json.load(open("latest.json"))
          p = m["platforms"]
          if "linux-x86_64-appimage" in p:
              p["linux-x86_64"] = p["linux-x86_64-appimage"]
          json.dump(m, open("latest.json", "w"), indent=2)
          PY
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

          # Publish the draft so `releases/latest/download/latest.json` resolves
          # for the auto-updater. tauri-action leaves the release as a draft.
          gh release edit "$TAG" --repo "$REPO" --draft=false
