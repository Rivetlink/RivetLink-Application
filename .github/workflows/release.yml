name: Release

# Builds native installers for Linux, macOS, and Windows, signs the updater
# artifacts, and publishes them + a `latest.json`. tauri-action uploads to a
# draft release; the rename-assets job renames the assets and publishes it so
# the `releases/latest/download/latest.json` updater endpoint resolves.
# Triggered by pushing a version tag (v1.2.3) or manually.
#
# Bundles: deb/rpm + AppImage (Linux), dmg/app (macOS, universal), nsis/msi
# (Windows). Auto-update works on macOS + Windows + the Linux AppImage (the
# updater fetches latest.json and installs in place). The .deb/.rpm install via
# the package manager and the app only notifies about new versions there.
#
# All bundles are produced by ONE `release` matrix job — the two Linux entries
# build on different Ubuntu bases on purpose (see the matrix comments).
#
# Requires repo secrets:
#   SDK_REPO_TOKEN            — read access to the private Rivetlink/RivetLink.
#   TAURI_SIGNING_PRIVATE_KEY — the minisign private key for updater signatures.
# The matching public key lives in tauri.conf.json (plugins.updater.pubkey).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux: .deb / .rpm, built on 24.04 ----------------------------
          # Links glibc 2.39, so it runs on hosts with glibc >= 2.39 (Ubuntu
          # 24.04+, Debian 13+, Fedora 39+). These use the HOST's pipewire (not
          # bundled), and 24.04 ships pipewire 1.0.x natively so libspa 0.8
          # compiles and the .deb declares a clean `Depends:` on a normal
          # pipewire. We must NOT build these on 22.04 (see the next entry).
          - os: ubuntu-24.04
            args: "--bundles deb,rpm"
          # --- Linux: AppImage (broad-compat), built on 22.04 ----------------
          # Built on 22.04 so EVERYTHING it bundles (our binary + webkit/gtk/
          # glib/pipewire) links glibc <= 2.35 and runs on hosts down to 22.04 —
          # the 24.04 deb/rpm above need glibc 2.38/2.39. The one 22.04 blocker
          # is libspa 0.8 (needs PipeWire >= 0.3.65 headers; jammy ships 0.3.48),
          # solved with the pipewire-upstream PPA (newer PipeWire built FOR jammy
          # -> still glibc 2.35). The AppImage bundles libpipewire so it has no
          # host pipewire dep. After tauri builds it we strip libwayland (EGL
          # white-screen fix) and re-sign — see the `if: matrix.appimage` steps.
          # NB: the deb can't take this PPA — dpkg-shlibdeps would stamp a
          # `Depends: libpipewire-0.3-0 (>= 1.0)` that a stock 22.04 can't satisfy.
          - os: ubuntu-22.04
            args: "--bundles appimage"
            ppa: true
            appimage: true
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          # Key on the exact runner image so the two Linux bases never share a
          # target/: a 24.04-built target/ (build scripts linked against glibc
          # 2.39) restored into the 22.04 job fails with "GLIBC_2.39 not found".
          # The `-pw-ppa` suffix on the AppImage (PPA) build keeps it off any
          # stale plain `ubuntu-22.04` cache whose libspa-sys bindgen output
          # predates the PPA's pipewire and lacks `spa_video_info_raw.flags`.
          key: ${{ matrix.os }}${{ matrix.ppa && '-pw-ppa' || '' }}
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        env:
          # Only the AppImage entry takes the pipewire PPA (see matrix comment).
          USE_PIPEWIRE_PPA: ${{ matrix.ppa && 'true' || 'false' }}
        run: |
          # The hosted ubuntu runner's apt mirror sometimes crawls (~20s/package
          # instead of <1s), which used to hang the whole job. Two guards:
          #  - --no-install-recommends: skip docs/codecs/extras we don't need to
          #    *build*, so we fetch far fewer packages and ride the slow mirror less.
          #  - timeout + retry: kill a stalled fetch and resume from apt's cache
          #    (already-downloaded .debs survive, so a retry continues, not restarts).
          apt_retry() {
            for i in 1 2 3 4; do
              if sudo timeout 600 "$@"; then return 0; fi
              echo "::warning::apt timed out/failed (attempt $i): $*"
              sleep 10
            done
            return 1
          }
          if [ "$USE_PIPEWIRE_PPA" = "true" ]; then
            # jammy ships PipeWire 0.3.48; pipewire/libspa 0.8 needs >= 0.3.65
            # headers. This PPA backports recent PipeWire built for jammy, so the
            # headers let libspa compile and the runtime lib still links glibc 2.35.
            apt_retry add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          fi
          apt_retry apt-get update
          apt_retry apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            clang libclang-dev libpam0g-dev file
          # clang + libclang-dev: pam-sys uses bindgen, which needs libclang.so
          # (with --no-install-recommends, `clang` alone doesn't pull it). Linux
          # screen capture no longer uses scap/pipewire-sys — it shells out to the
          # host's GStreamer (gst-launch pipewiresrc) — so no libpipewire dev dep.
          if [ "$USE_PIPEWIRE_PPA" = "true" ]; then
            echo "pipewire dev version: $(pkg-config --modversion libpipewire-0.3 || echo '?')"
          fi

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      # The AppStream <releases> entry should always match the tag being built.
      # Stamp it here so it never needs manual editing per version.
      - name: Stamp metainfo release
        if: startsWith(matrix.os, 'ubuntu')
        working-directory: RivetLink-Application/src-tauri/metainfo
        env:
          TAG: ${{ github.ref_name }}
        run: |
          V="${TAG#v}"
          DATE="$(date +%F)"
          python3 - "$V" "$DATE" <<'PY'
          import re, sys
          v, d = sys.argv[1], sys.argv[2]
          f = "com.rivetlink.app.metainfo.xml"
          s = open(f).read()
          block = f'  <releases>\n    <release version="{v}" date="{d}" />\n  </releases>'
          s = re.sub(r"  <releases>.*?</releases>", block, s, flags=re.S)
          open(f, "w").write(s)
          print(block)
          PY

      - name: Build, sign, and publish to a draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The AppImage build invokes appimagetool, which can't use FUSE on the
          # runner; extract-and-run instead. Harmless for the other entries.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          projectPath: RivetLink-Application
          tagName: ${{ github.ref_name }}
          releaseName: "RivetLink ${{ github.ref_name }}"
          releaseBody: |
            Native installers for Linux, macOS, and Windows. macOS/Windows + the Linux AppImage update in place; the .deb/.rpm install via your package manager.

            **Minimum OS versions:**
            - **Linux — AppImage** (`*_linux_amd64.AppImage`): glibc ≥ 2.35 → Ubuntu/Kubuntu 22.04+, Debian 12+, Fedora 36+. No install needed: `chmod +x` and run.
            - **Linux — .deb / .rpm**: glibc ≥ 2.39 → Ubuntu/Kubuntu 24.04+, Debian 13+, Fedora 39+. On older systems use the AppImage instead.
            - **macOS**: 11 Big Sur or newer (universal: Apple Silicon + Intel).
            - **Windows**: 10 (1809) or newer, 64-bit.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # --- AppImage post-processing (only the matrix.appimage entry) ----------
      # tauri-action just built, signed, and uploaded the AppImage. But the jammy
      # build bundled libwayland-client/cursor/egl/server, which on newer hosts
      # (e.g. Ubuntu 26.04) mix with the host's mesa libEGL and abort at startup
      # with "Could not create default EGL display: EGL_BAD_PARAMETER", leaving a
      # white window. We strip those libs, repack, and re-sign; rename-assets then
      # refreshes the AppImage signature inside latest.json.
      #
      # Two steps on purpose: the repack downloads + runs appimagetool, so it must
      # NOT have the signing key in its environment (a compromised tool could
      # exfiltrate it). The key is only exposed to the re-sign step, which runs
      # nothing but the trusted tauri CLI from our npm deps.
      - name: Strip bundled libwayland (EGL white-screen fix) + repack
        if: matrix.appimage
        working-directory: RivetLink-Application/src-tauri/target/release/bundle/appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          AI=$(ls *.AppImage | head -1)
          echo "repacking $AI"
          ./"$AI" --appimage-extract >/dev/null
          # libwayland* MUST come from the host (ABI-stable, present on every
          # desktop, and on the standard AppImage excludelist for this reason).
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          # Pinned appimagetool 1.9.1 (NOT the mutable `continuous` tag), verified
          # by SHA-256 before we execute it — supply-chain hardening.
          wget -q https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          echo "ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0  /tmp/appimagetool" | sha256sum -c -
          chmod +x /tmp/appimagetool
          rm -f "$AI"
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$AI"
          rm -rf squashfs-root

      - name: Re-sign repacked AppImage for the updater
        if: matrix.appimage
        working-directory: RivetLink-Application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          set -euo pipefail
          AI=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          # The repack invalidated tauri's updater signature; regenerate the .sig.
          npm run tauri -- signer sign --password "" "$AI"

      - name: Verify no bundled lib needs glibc > 2.35
        if: matrix.appimage
        working-directory: RivetLink-Application/src-tauri/target/release/bundle/appimage
        run: |
          # No `set -e`: objdump/grep exit 1 on libs without GLIBC symbols, which
          # is normal and must not abort the gate.
          AI=$(ls *.AppImage | head -1)
          ./"$AI" --appimage-extract >/dev/null 2>&1 || true
          find squashfs-root -name '*.so*' -type f -print0 \
            | xargs -0 objdump -T 2>/dev/null \
            | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq > /tmp/glibc_versions.txt
          echo "=== all GLIBC versions across bundled libs ==="
          cat /tmp/glibc_versions.txt
          if grep -qE 'GLIBC_2\.(3[6-9]|4[0-9])' /tmp/glibc_versions.txt; then
            echo "::error::a bundled lib needs glibc newer than 2.35 — won't run on 22.04"
            exit 1
          fi
          echo "OK: all bundled libs link glibc <= 2.35"

      - name: Re-upload repacked AppImage over tauri-action's original
        if: matrix.appimage
        working-directory: RivetLink-Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Overwrite the un-stripped .AppImage + .sig tauri-action uploaded.
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/appimage/*.AppImage* \
            --repo "$REPO" --clobber

  # tauri-action names artifacts without the OS word (e.g. RivetLink_0.1.4_amd64.deb).
  # Rename every asset to RivetLink_<version>_<os>_<arch>.<ext>, patch the URLs
  # inside latest.json, and refresh the Linux AppImage signature (it changed when
  # we repacked the AppImage above).
  rename-assets:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Rename release assets + patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${TAG#v}"
          gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | "\(.apiUrl)\t\(.name)"' > assets.tsv
          while IFS=$'\t' read -r url name; do
            case "$name" in
              *_amd64.deb)                new="RivetLink_${V}_linux_amd64.deb" ;;
              *_amd64.deb.sig)            new="RivetLink_${V}_linux_amd64.deb.sig" ;;
              *.x86_64.rpm)               new="RivetLink_${V}_linux_x86_64.rpm" ;;
              *.x86_64.rpm.sig)           new="RivetLink_${V}_linux_x86_64.rpm.sig" ;;
              *_amd64.AppImage)           new="RivetLink_${V}_linux_amd64.AppImage" ;;
              *_amd64.AppImage.sig)       new="RivetLink_${V}_linux_amd64.AppImage.sig" ;;
              *_universal.dmg)            new="RivetLink_${V}_macos_universal.dmg" ;;
              *_universal.app.tar.gz)     new="RivetLink_${V}_macos_universal.app.tar.gz" ;;
              *_universal.app.tar.gz.sig) new="RivetLink_${V}_macos_universal.app.tar.gz.sig" ;;
              *x64-setup.exe)             new="RivetLink_${V}_windows_x64-setup.exe" ;;
              *x64-setup.exe.sig)         new="RivetLink_${V}_windows_x64-setup.exe.sig" ;;
              *x64_en-US.msi)             new="RivetLink_${V}_windows_x64_en-US.msi" ;;
              *x64_en-US.msi.sig)         new="RivetLink_${V}_windows_x64_en-US.msi.sig" ;;
              *) continue ;;
            esac
            [ "$name" = "$new" ] && continue
            gh api -X PATCH "${url#https://api.github.com}" -f name="$new" -q '.name' \
              | sed "s/^/renamed: $name -> /"
          done < assets.tsv

          LJ_URL=$(gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | select(.name=="latest.json") | .apiUrl')
          gh api "${LJ_URL#https://api.github.com}" \
            -H "Accept: application/octet-stream" > latest.json
          sed -i \
            -e "s#RivetLink_${V}_amd64.deb#RivetLink_${V}_linux_amd64.deb#g" \
            -e "s#RivetLink-${V}-1.x86_64.rpm#RivetLink_${V}_linux_x86_64.rpm#g" \
            -e "s#RivetLink_${V}_amd64.AppImage#RivetLink_${V}_linux_amd64.AppImage#g" \
            -e "s#RivetLink_${V}_x64_en-US.msi#RivetLink_${V}_windows_x64_en-US.msi#g" \
            -e "s#RivetLink_${V}_x64-setup.exe#RivetLink_${V}_windows_x64-setup.exe#g" \
            -e "s#RivetLink_universal.app.tar.gz#RivetLink_${V}_macos_universal.app.tar.gz#g" \
            latest.json

          # We stripped libwayland + repacked the AppImage AFTER tauri-action
          # signed it, so latest.json holds the stale (pre-repack) signature.
          # Replace it with the re-signed .sig so Linux self-update verifies.
          SIG_URL=$(gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | select(.name=="RivetLink_'"${V}"'_linux_amd64.AppImage.sig") | .apiUrl')
          NEW_SIG=""
          if [ -n "$SIG_URL" ]; then
            NEW_SIG=$(gh api "${SIG_URL#https://api.github.com}" -H "Accept: application/octet-stream")
          fi
          APPIMAGE_URL="https://github.com/${REPO}/releases/download/${TAG}/RivetLink_${V}_linux_amd64.AppImage" \
          NEW_SIG="$NEW_SIG" python3 - <<'PY'
          import json, os
          m = json.load(open("latest.json"))
          p = m.setdefault("platforms", {})
          sig = os.environ.get("NEW_SIG", "").strip()
          url = os.environ["APPIMAGE_URL"]
          # tauri historically used a `-appimage` suffixed key; collapse it.
          p.pop("linux-x86_64-appimage", None)
          if sig:
              # Point Linux self-update at the repacked AppImage with its fresh sig.
              p["linux-x86_64"] = {"signature": sig, "url": url}
          json.dump(m, open("latest.json", "w"), indent=2)
          print("linux-x86_64:", "set" if sig else "left as-is (no .sig found)")
          PY
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

          # Publish the draft so `releases/latest/download/latest.json` resolves
          # for the auto-updater. tauri-action leaves the release as a draft.
          gh release edit "$TAG" --repo "$REPO" --draft=false
