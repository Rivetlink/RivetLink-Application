name: Release

# Builds native installers for Linux, macOS, and Windows and attaches them to
# a GitHub Release. Triggered by pushing a version tag (v1.2.3) or manually.
#
# Outputs (unsigned for now — see the signing note below):
#   Linux   → .AppImage + .deb
#   macOS   → .dmg + .app (universal: Intel + Apple Silicon)
#   Windows → .msi + .exe (NSIS)
#
# Signing is a follow-up and needs paid certs, NOT a physical Mac:
#   macOS   → Apple Developer ID cert + notarization, supplied via secrets
#             (APPLE_CERTIFICATE, APPLE_ID, etc.) to tauri-action.
#   Windows → Authenticode code-signing cert.
#   Linux   → no signing ecosystem; ships as-is.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ""
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          # Extra targets for the macOS universal binary; harmless elsewhere.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: RivetLink-Application
          tagName: ${{ github.ref_name }}
          releaseName: "RivetLink ${{ github.ref_name }}"
          releaseBody: "Native installers for Linux, macOS, and Windows. Unsigned — see the README for installing past Gatekeeper/SmartScreen."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
