name: Release

# Builds native installers for Linux, macOS, and Windows, signs the updater
# artifacts, and publishes them + a `latest.json`. tauri-action uploads to a
# draft release; the rename-assets job renames the assets and publishes it so
# the `releases/latest/download/latest.json` updater endpoint resolves.
# Triggered by pushing a version tag (v1.2.3) or manually.
#
# Bundles: deb/rpm (Linux), dmg/app (macOS, universal), nsis/msi (Windows).
# Auto-update works on macOS + Windows (the app's updater fetches latest.json
# and installs in place). Linux installs via the .deb/.rpm; the app only
# notifies about new versions there.
#
# Requires repo secrets:
#   SDK_REPO_TOKEN            — read access to the private Rivetlink/RivetLink.
#   TAURI_SIGNING_PRIVATE_KEY — the minisign private key for updater signatures.
# The matching public key lives in tauri.conf.json (plugins.updater.pubkey).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ships .deb/.rpm, built on 24.04. The binary links glibc 2.39,
          # so it runs on hosts with glibc >= 2.39 (Ubuntu 24.04+, Debian 13+,
          # Fedora 39+, recent Arch). We can NOT just build on an older base to
          # lower that floor: the capture crate pipewire/libspa 0.8 (via scap)
          # needs PipeWire >= 0.3.65 headers, and 22.04 ships 0.3.48 — its
          # `spa_video_info_raw` has no `flags` field, so libspa won't compile.
          # glibc floor (old base) and PipeWire floor (new base) conflict on a
          # single native build, so reaching glibc < 2.39 needs cargo-zigbuild
          # (compile on 24.04 headers, link an older glibc) — a separate path.
          # AppImage is dropped here: a 24.04-built one aborts (EGL/glib) on
          # Ubuntu 26.04. Flatpak / a zigbuild AppImage are the broad-compat paths.
          - os: ubuntu-24.04
            args: "--bundles deb,rpm"
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          # Key on the exact runner image so a 24.04-built target/ (build scripts
          # linked against glibc 2.39) is never restored into the 22.04 job —
          # those cached binaries fail with "GLIBC_2.39 not found" on 22.04.
          key: ${{ matrix.os }}
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # The hosted ubuntu runner's apt mirror sometimes crawls (~20s/package
          # instead of <1s), which used to hang the whole job. Two guards:
          #  - --no-install-recommends: skip docs/codecs/extras we don't need to
          #    *build* (the bundled .deb declares its own runtime depends), so we
          #    fetch far fewer packages and ride the slow mirror less.
          #  - timeout + retry: kill a stalled fetch and resume from apt's cache
          #    (already-downloaded .debs survive, so a retry continues, not restarts).
          apt_retry() {
            for i in 1 2 3 4; do
              if sudo timeout 600 "$@"; then return 0; fi
              echo "::warning::apt timed out/failed (attempt $i): $*"
              sleep 10
            done
            return 1
          }
          apt_retry apt-get update
          apt_retry apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev clang libpam0g-dev
          # libpipewire + clang: the app now embeds the host capture stack
          # (scap -> PipeWire/ScreenCast portal; pipewire-sys uses bindgen).

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      # The AppStream <releases> entry should always match the tag being built.
      # Stamp it here so it never needs manual editing per version.
      - name: Stamp metainfo release
        if: startsWith(matrix.os, 'ubuntu')
        working-directory: RivetLink-Application/src-tauri/metainfo
        env:
          TAG: ${{ github.ref_name }}
        run: |
          V="${TAG#v}"
          DATE="$(date +%F)"
          python3 - "$V" "$DATE" <<'PY'
          import re, sys
          v, d = sys.argv[1], sys.argv[2]
          f = "com.rivetlink.app.metainfo.xml"
          s = open(f).read()
          block = f'  <releases>\n    <release version="{v}" date="{d}" />\n  </releases>'
          s = re.sub(r"  <releases>.*?</releases>", block, s, flags=re.S)
          open(f, "w").write(s)
          print(block)
          PY

      - name: Build, sign, and publish to a draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: RivetLink-Application
          tagName: ${{ github.ref_name }}
          releaseName: "RivetLink ${{ github.ref_name }}"
          releaseBody: |
            Native installers for Linux, macOS, and Windows. macOS/Windows update in place; on Linux install the .deb/.rpm or run the AppImage.

            **Minimum OS versions:**
            - **Linux — AppImage** (`*_linux_amd64.AppImage`): glibc ≥ 2.35 → Ubuntu/Kubuntu 22.04+, Debian 12+, Fedora 36+. No install needed: `chmod +x` and run.
            - **Linux — .deb / .rpm**: glibc ≥ 2.39 → Ubuntu/Kubuntu 24.04+, Debian 13+, Fedora 39+. On older systems use the AppImage instead.
            - **macOS**: 11 Big Sur or newer (universal: Apple Silicon + Intel).
            - **Windows**: 10 (1809) or newer, 64-bit.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Broad-compat Linux AppImage, built on Ubuntu 22.04 so EVERYTHING it bundles
  # (our binary + the webkit/gtk/glib/pipewire .so files pulled from apt) links
  # glibc 2.35 and runs on hosts down to 22.04 — the deb/rpm above are built on
  # 24.04 and their bundled libs need glibc 2.38/2.39 (24.04+ only). The one
  # blocker on 22.04 is the capture crate: pipewire/libspa 0.8 needs PipeWire
  # >= 0.3.65 headers and jammy ships 0.3.48, so we add the pipewire-upstream
  # PPA (newer PipeWire built for jammy -> still glibc 2.35). This job uploads
  # the .AppImage into the same draft release the `release` job created;
  # rename-assets then renames it like the other assets.
  appimage:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          key: appimage-jammy
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies (+ pipewire-upstream PPA for libspa 0.8)
        run: |
          apt_retry() {
            for i in 1 2 3 4; do
              if sudo timeout 600 "$@"; then return 0; fi
              echo "::warning::apt timed out/failed (attempt $i): $*"
              sleep 10
            done
            return 1
          }
          # jammy ships PipeWire 0.3.48; pipewire/libspa 0.8 needs >= 0.3.65
          # headers. This PPA backports recent PipeWire built for jammy, so the
          # headers let libspa compile and the runtime lib still links glibc 2.35.
          apt_retry add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          apt_retry apt-get update
          apt_retry apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev clang libpam0g-dev file
          echo "pipewire dev version: $(pkg-config --modversion libpipewire-0.3 || echo '?')"

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      - name: Build AppImage
        working-directory: RivetLink-Application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm run tauri build -- --bundles appimage

      - name: Strip bundled libwayland (EGL white-screen fix) + repack + re-sign
        working-directory: RivetLink-Application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          AI=$(ls *.AppImage | head -1)
          echo "repacking $AI"
          ./"$AI" --appimage-extract >/dev/null
          # libwayland* MUST come from the host. The bundled jammy copies mix with
          # the host's mesa libEGL on newer hosts (e.g. 26.04) and abort with
          # "Could not create default EGL display: EGL_BAD_PARAMETER", leaving a
          # white window. These libs are ABI-stable and present on every desktop,
          # so dropping them is safe on 22.04/24.04/26.04 alike — and the standard
          # AppImage excludelist drops them for exactly this reason.
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          rm -f "$AI"
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$AI"
          rm -rf squashfs-root
          cd "$GITHUB_WORKSPACE/RivetLink-Application"
          # The repack invalidated tauri's updater signature; regenerate the .sig
          # so the auto-updater still verifies the AppImage.
          npm run tauri -- signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" \
            "src-tauri/target/release/bundle/appimage/$AI"

      - name: Verify no bundled lib needs glibc > 2.35
        working-directory: RivetLink-Application/src-tauri/target/release/bundle/appimage
        run: |
          # No `set -e`: objdump/grep exit 1 on libs without GLIBC symbols, which
          # is normal and must not abort the gate.
          AI=$(ls *.AppImage | head -1)
          ./"$AI" --appimage-extract >/dev/null 2>&1 || true
          find squashfs-root -name '*.so*' -type f -print0 \
            | xargs -0 objdump -T 2>/dev/null \
            | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq > /tmp/glibc_versions.txt
          echo "=== all GLIBC versions across bundled libs ==="
          cat /tmp/glibc_versions.txt
          if grep -qE 'GLIBC_2\.(3[6-9]|4[0-9])' /tmp/glibc_versions.txt; then
            echo "::error::a bundled lib needs glibc newer than 2.35 — won't run on 22.04"
            exit 1
          fi
          echo "OK: all bundled libs link glibc <= 2.35"

      - name: Upload AppImage into the draft release
        working-directory: RivetLink-Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            src-tauri/target/release/bundle/appimage/*.AppImage* \
            --repo "$REPO" --clobber

  # tauri-action names artifacts without the OS word (e.g. RivetLink_0.1.4_amd64.deb).
  # Rename every asset to RivetLink_<version>_<os>_<arch>.<ext> and patch the
  # matching URLs inside latest.json so the updater still resolves them.
  rename-assets:
    needs: [release, appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Rename release assets + patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${TAG#v}"
          gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | "\(.apiUrl)\t\(.name)"' > assets.tsv
          while IFS=$'\t' read -r url name; do
            case "$name" in
              *_amd64.deb)                new="RivetLink_${V}_linux_amd64.deb" ;;
              *_amd64.deb.sig)            new="RivetLink_${V}_linux_amd64.deb.sig" ;;
              *.x86_64.rpm)               new="RivetLink_${V}_linux_x86_64.rpm" ;;
              *.x86_64.rpm.sig)           new="RivetLink_${V}_linux_x86_64.rpm.sig" ;;
              *_amd64.AppImage)           new="RivetLink_${V}_linux_amd64.AppImage" ;;
              *_amd64.AppImage.sig)       new="RivetLink_${V}_linux_amd64.AppImage.sig" ;;
              *_universal.dmg)            new="RivetLink_${V}_macos_universal.dmg" ;;
              *_universal.app.tar.gz)     new="RivetLink_${V}_macos_universal.app.tar.gz" ;;
              *_universal.app.tar.gz.sig) new="RivetLink_${V}_macos_universal.app.tar.gz.sig" ;;
              *x64-setup.exe)             new="RivetLink_${V}_windows_x64-setup.exe" ;;
              *x64-setup.exe.sig)         new="RivetLink_${V}_windows_x64-setup.exe.sig" ;;
              *x64_en-US.msi)             new="RivetLink_${V}_windows_x64_en-US.msi" ;;
              *x64_en-US.msi.sig)         new="RivetLink_${V}_windows_x64_en-US.msi.sig" ;;
              *) continue ;;
            esac
            [ "$name" = "$new" ] && continue
            gh api -X PATCH "${url#https://api.github.com}" -f name="$new" -q '.name' \
              | sed "s/^/renamed: $name -> /"
          done < assets.tsv

          LJ_URL=$(gh release view "$TAG" --repo "$REPO" --json assets \
            -q '.assets[] | select(.name=="latest.json") | .apiUrl')
          gh api "${LJ_URL#https://api.github.com}" \
            -H "Accept: application/octet-stream" > latest.json
          sed -i \
            -e "s#RivetLink_${V}_amd64.deb#RivetLink_${V}_linux_amd64.deb#g" \
            -e "s#RivetLink-${V}-1.x86_64.rpm#RivetLink_${V}_linux_x86_64.rpm#g" \
            -e "s#RivetLink_${V}_amd64.AppImage#RivetLink_${V}_linux_amd64.AppImage#g" \
            -e "s#RivetLink_${V}_x64_en-US.msi#RivetLink_${V}_windows_x64_en-US.msi#g" \
            -e "s#RivetLink_${V}_x64-setup.exe#RivetLink_${V}_windows_x64-setup.exe#g" \
            -e "s#RivetLink_universal.app.tar.gz#RivetLink_${V}_macos_universal.app.tar.gz#g" \
            latest.json
          # The .deb and .AppImage are built in separate jobs (different Ubuntu
          # bases), so the merged manifest's primary "linux-x86_64" key can race
          # to the .deb. Force it to the AppImage — the only self-updatable Linux
          # format — so updates install in place instead of opening a download.
          python3 - <<'PY'
          import json
          m = json.load(open("latest.json"))
          p = m["platforms"]
          if "linux-x86_64-appimage" in p:
              p["linux-x86_64"] = p["linux-x86_64-appimage"]
          json.dump(m, open("latest.json", "w"), indent=2)
          PY
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

          # Publish the draft so `releases/latest/download/latest.json` resolves
          # for the auto-updater. tauri-action leaves the release as a draft.
          gh release edit "$TAG" --repo "$REPO" --draft=false
