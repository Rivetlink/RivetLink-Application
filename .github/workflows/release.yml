name: Release

# Builds native installers for Linux, macOS, and Windows, renames them to
# RivetLink_<version>_<os>.<ext>, and attaches them to a draft GitHub Release.
# Triggered by pushing a version tag (v1.2.3) or manually.
#
# Outputs (unsigned for now — see the signing note below):
#   Linux   → RivetLink_<v>_linux.AppImage + .deb
#   macOS   → RivetLink_<v>_macos.dmg (universal: Intel + Apple Silicon)
#   Windows → RivetLink_<v>_windows.exe (NSIS) + .msi
#
# Signing is a follow-up and needs paid certs, NOT a physical Mac:
#   macOS   → Apple Developer ID cert + notarization, supplied via secrets.
#   Windows → Authenticode code-signing cert.
#   Linux   → no signing ecosystem; ships as-is.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            args: ""
          - os: macos-latest
            label: macos
            args: "--target universal-apple-darwin"
          - os: windows-latest
            label: windows
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      # Build only — no release here. tauri-action exposes the built bundle
      # paths via its `artifactPaths` output, which the next step renames.
      - name: Build installers
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        with:
          projectPath: RivetLink-Application
          args: ${{ matrix.args }}

      - name: Rename artifacts -> RivetLink_<version>_<os>
        id: rename
        shell: bash
        env:
          OS_LABEL: ${{ matrix.label }}
          REF_NAME: ${{ github.ref_name }}
          ARTIFACTS_JSON: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          mkdir -p dist-artifacts
          # artifactPaths is a JSON array of file paths produced by the bundler.
          echo "$ARTIFACTS_JSON" | jq -r '.[]' | while IFS= read -r src; do
            [ -f "$src" ] || continue
            base="$(basename "$src")"
            ext="${base##*.}"
            # Keep .tar.gz / .app.tar.gz style double extensions intact.
            case "$base" in
              *.app.tar.gz) ext="app.tar.gz" ;;
              *.tar.gz)     ext="tar.gz" ;;
            esac
            dest="dist-artifacts/RivetLink_${version}_${OS_LABEL}.${ext}"
            # If two bundles share an extension, suffix to avoid clobbering.
            if [ -e "$dest" ]; then
              dest="dist-artifacts/RivetLink_${version}_${OS_LABEL}_$(echo "$base" | tr -cd '[:alnum:]' | tail -c 6).${ext}"
            fi
            cp "$src" "$dest"
            echo "renamed: $base -> $(basename "$dest")"
          done
          ls -la dist-artifacts

      - name: Publish to draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: RivetLink ${{ github.ref_name }}
          draft: true
          prerelease: false
          body: "Native installers for Linux, macOS, and Windows. Unsigned — see the README for installing past Gatekeeper/SmartScreen."
          files: dist-artifacts/*
