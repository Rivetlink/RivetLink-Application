name: AppImage (Ubuntu 22.04 base, glibc 2.35)

# Experimental: build a Linux AppImage on Ubuntu 22.04 so EVERYTHING it bundles
# (our binary + the webkit/gtk/glib/pipewire .so files pulled from apt) links
# glibc 2.35 and runs on hosts down to 22.04. The normal release builds on
# 24.04, whose bundled libs need glibc 2.38/2.39 — that's why a 24.04 AppImage
# fails on 22.04 even when our own binary is zig-linked to 2.35: the *bundled*
# libwebkit/libpipewire/libgtk/etc. still demand 2.38.
#
# The one blocker on 22.04 is the capture crate: pipewire/libspa 0.8 needs
# PipeWire >= 0.3.65 headers and jammy ships 0.3.48. We add the pipewire-upstream
# PPA — newer PipeWire built FOR jammy, so still glibc 2.35 — which gives both
# the headers (libspa compiles) and a matching runtime lib to bundle.
#
# Manual-only for now. Uploads the .AppImage plus a report of the highest glibc
# any bundled lib needs (must be <= 2.35). Once it runs on 22.04/24.04/26.04,
# this recipe is mirrored by the `appimage` job in release.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appimage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          path: RivetLink-Application

      - name: Checkout RivetLink (SDK source, sibling for the path dep)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: Rivetlink/RivetLink
          path: RivetLink
          token: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RivetLink-Application/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: RivetLink-Application/src-tauri -> target
          key: appimage-jammy
          cache-on-failure: "true"
          cache-all-crates: "true"

      - name: Install Linux dependencies (+ pipewire-upstream PPA for libspa 0.8)
        run: |
          apt_retry() {
            for i in 1 2 3 4; do
              if sudo timeout 600 "$@"; then return 0; fi
              echo "::warning::apt timed out/failed (attempt $i): $*"
              sleep 10
            done
            return 1
          }
          # jammy ships PipeWire 0.3.48; pipewire/libspa 0.8 needs >= 0.3.65
          # headers. This PPA backports recent PipeWire built for jammy, so the
          # headers let libspa compile and the runtime lib still links glibc 2.35.
          apt_retry add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          apt_retry apt-get update
          apt_retry apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libayatana-appindicator3-dev \
            libpipewire-0.3-dev clang libpam0g-dev file
          echo "pipewire dev version: $(pkg-config --modversion libpipewire-0.3 || echo '?')"

      - name: Install npm dependencies
        working-directory: RivetLink-Application
        run: npm ci

      - name: Build AppImage
        working-directory: RivetLink-Application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # AppImage tooling can't use FUSE on the runner; extract-and-run instead.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm run tauri build -- --bundles appimage

      - name: Strip bundled libwayland (EGL white-screen fix) + repack + re-sign
        working-directory: RivetLink-Application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          AI=$(ls *.AppImage | head -1)
          echo "repacking $AI"
          ./"$AI" --appimage-extract >/dev/null
          # libwayland* MUST come from the host. The bundled jammy copies mix with
          # the host's mesa libEGL on newer hosts (e.g. 26.04) and abort with
          # "Could not create default EGL display: EGL_BAD_PARAMETER", leaving a
          # white window. These libs are ABI-stable and present on every desktop,
          # so dropping them is safe on 22.04/24.04/26.04 alike — and the standard
          # AppImage excludelist drops them for exactly this reason.
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          rm -f "$AI"
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$AI"
          rm -rf squashfs-root
          cd "$GITHUB_WORKSPACE/RivetLink-Application"
          # The repack invalidated tauri's updater signature; regenerate the .sig.
          npm run tauri -- signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" \
            "src-tauri/target/release/bundle/appimage/$AI"

      - name: Verify no bundled lib needs glibc > 2.35
        working-directory: RivetLink-Application/src-tauri/target/release/bundle/appimage
        run: |
          # No `set -e` here: objdump/grep legitimately exit 1 on libs that have
          # no GLIBC symbols, and we don't want that to abort the check.
          echo "=== our binary (rivetlink-app) ==="
          BIN=$(find ../../.. -maxdepth 2 -type f -name rivetlink-app | head -1)
          objdump -T "$BIN" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq | tail -3
          AI=$(ls *.AppImage | head -1)
          ./"$AI" --appimage-extract >/dev/null 2>&1 || true
          # Every GLIBC_x.y any bundled lib asks for, de-duplicated and sorted.
          find squashfs-root -name '*.so*' -type f -print0 \
            | xargs -0 objdump -T 2>/dev/null \
            | grep -oE 'GLIBC_[0-9.]+' | sort -V | uniq > /tmp/glibc_versions.txt
          echo "=== all GLIBC versions across bundled libs ==="
          cat /tmp/glibc_versions.txt
          # Fail only if something actually needs newer than 2.35.
          if grep -qE 'GLIBC_2\.(3[6-9]|4[0-9])' /tmp/glibc_versions.txt; then
            echo "::error::a bundled lib needs glibc newer than 2.35 — won't run on 22.04"
            echo "--- offending libs ---"
            for so in $(find squashfs-root -name '*.so*' -type f); do
              hi=$(objdump -T "$so" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' | sort -V | tail -1)
              case "$hi" in GLIBC_2.3[6-9]|GLIBC_2.4*) echo "$hi  $so" ;; esac
            done
            exit 1
          fi
          echo "OK: all bundled libs link glibc <= 2.35"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: RivetLink-AppImage-jammy
          path: RivetLink-Application/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
