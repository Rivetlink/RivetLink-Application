[package]
name = "rivetlink-app"
version = "0.1.3"
description = "RivetLink desktop app"
authors = ["RivetLink"]
edition = "2021"

[lib]
# The `_lib` suffix keeps the lib name distinct from the bin (Windows quirk,
# see https://github.com/rust-lang/cargo/issues/8519).
name = "rivetlink_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `devtools` keeps the web inspector available in release builds too (right-
# click -> Inspect Element). Drop it for a hardened production release.
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }

# Local path dep on the SDK while both repos sit side by side. For distribution
# this switches to a git dep or a crates.io release.
rivetlink-sdk = { path = "../../RivetLink/crates/rivetlink-sdk" }
